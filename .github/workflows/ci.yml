name: CI

# Runs on every push to main and on pull requests. This public repository's
# pipeline is intentionally test-only — it type-checks, runs the unit tests,
# and produces a production build. It deploys nothing and requires no secrets.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Type-check, test & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22 # matches the Dockerfile build stage
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
